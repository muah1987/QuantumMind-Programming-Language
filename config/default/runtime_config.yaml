# QuantumMind Default Configuration

# Compiler Settings
compiler:
  target: python
  optimization_level: 1
  debug_symbols: false
  quantum_circuit_optimization: true
  parallel_compilation: true
  max_compilation_time: 300  # seconds

# Runtime Settings
runtime:
  max_memory_gb: 8
  max_cpu_cores: 4
  enable_distributed: false
  performance_monitoring: true
  garbage_collection_quantum: true
  checkpoint_interval: 300  # seconds

# Quantum Backend Configuration
quantum:
  default_backend: simulator
  simulators:
    - qiskit_aer
    - cirq_simulator
    - pennylane_default
  hardware_backends: []
  max_qubits: 32
  default_shots: 1024
  error_mitigation: true

# Neural Network Configuration
neural:
  default_framework: pytorch
  frameworks:
    - pytorch
    - tensorflow
    - jax
  device: auto  # auto, cpu, cuda, mps
  mixed_precision: false
  distributed_training: false
  model_checkpointing: true

# Resource Management
resources:
  allocation_strategy: balanced  # balanced, performance, power_efficient
  auto_scaling: false
  resource_monitoring: true
  migration_enabled: false
  thermal_management: true
  power_budget_watts: 1000

# Parallel Processing
parallel:
  default_workers: auto
  task_scheduling: adaptive  # fifo, priority, adaptive
  load_balancing: true
  fault_tolerance: basic
  communication_backend: tcp

# Logging Configuration
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: quantummind.log
  rotation: daily
  max_size_mb: 100
  backup_count: 7

# Security Settings
security:
  enable_sandbox: true
  quantum_state_encryption: false
  network_encryption: true
  access_control: basic
  audit_logging: true

# Development Tools
development:
  auto_reload: false
  profiling: false
  debug_visualization: false
  code_formatting: true
  linting: true
  type_checking: true